basePath: /
definitions:
  subscription.SubReq:
    properties:
      end_date:
        type: string
      price:
        type: integer
      service_name:
        type: string
      start_date:
        type: string
      user_id:
        type: string
    type: object
  subscription.SubResp:
    properties:
      end_date:
        type: string
      id:
        type: integer
      price:
        type: integer
      service_name:
        type: string
      start_date:
        type: string
      user_id:
        type: string
    type: object
  subscription.SubSumResp:
    properties:
      total_price:
        type: integer
    type: object
info:
  contact: {}
  description: This is a service for subscriptions
  title: Subscription API
  version: "1.0"
paths:
  /subscriptions:
    get:
      description: Get paginated list of subscriptions with optional filters
      operationId: list-subscription
      parameters:
      - description: Page number (1-based)
        in: query
        name: page
        type: integer
      - description: Items per page (default:20, max:100)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List subscriptions
          schema:
            items:
              $ref: '#/definitions/subscription.SubResp'
            type: array
        "400":
          description: Bad request
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: List subscriptions
      tags:
      - subscription
    post:
      consumes:
      - application/json
      operationId: create-subscription
      parameters:
      - description: |-
          ID will be generated.
          Price must be \u003e 0.
          User_id must be uuid.
          Date format: MM-YYYY. End_date is optional.
        in: body
        name: sub
        required: true
        schema:
          $ref: '#/definitions/subscription.SubReq'
      produces:
      - application/json
      responses:
        "201":
          description: Created subscription
          schema:
            $ref: '#/definitions/subscription.SubResp'
        "400":
          description: Bad request
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Create subscription
      tags:
      - subscription
  /subscriptions/{id}:
    delete:
      description: Delete by subscription ID.
      operationId: delete-subscription
      parameters:
      - description: Subscription ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: no content
        "400":
          description: Bad request
          schema:
            type: string
        "404":
          description: Not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Delete subscription
      tags:
      - subscription
    get:
      description: Get by subscription ID.
      operationId: get-subscription
      parameters:
      - description: Subscription ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Subscription
          schema:
            $ref: '#/definitions/subscription.SubResp'
        "400":
          description: Bad request
          schema:
            type: string
        "404":
          description: Not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get subscription
      tags:
      - subscription
    put:
      consumes:
      - application/json
      description: Update by subscription ID.
      operationId: update-subscription
      parameters:
      - description: Subscription ID
        in: path
        name: id
        required: true
        type: string
      - description: Subscription
        in: body
        name: sub
        required: true
        schema:
          $ref: '#/definitions/subscription.SubReq'
      produces:
      - application/json
      responses:
        "200":
          description: Price must be \u003e 0.\nUser_id must be uuid.
          schema:
            $ref: '#/definitions/subscription.SubResp'
        "400":
          description: Bad request
          schema:
            type: string
        "404":
          description: Not found
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Update subscription
      tags:
      - subscription
  /subscriptions/sum:
    get:
      description: Get total_price of all subscriptions.
      operationId: get-subscription-sum
      parameters:
      - description: 'Date format: MM-YYYY'
        in: query
        name: start_date
        required: true
        type: string
      - description: 'Date format: MM-YYYY'
        in: query
        name: end_date
        required: true
        type: string
      - description: filter by service name
        in: query
        name: service_name
        type: string
      - description: filter by user ID
        in: query
        name: user_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Subscription sum
          schema:
            $ref: '#/definitions/subscription.SubSumResp'
        "400":
          description: Bad request
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get subscription summa
      tags:
      - subscription
swagger: "2.0"
